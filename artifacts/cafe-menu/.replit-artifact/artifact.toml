kind = "web"
previewPath = "/"
title = "Café Menu"
version = "1.0.0"
id = "artifacts/cafe-menu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25924

[services.development]
run = "pnpm --filter @workspace/cafe-menu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cafe-menu", "run", "build" ]
publicDir = "artifacts/cafe-menu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25924"
BASE_PATH = "/"
